name: Watch ROBO-ONE garage

on:
  workflow_dispatch:
  schedule:
    - cron: "0,20,40 * * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: robo-one-watch-${{ github.ref }}
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run watcher
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          NOTIFY_WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
          ROBO_ONE_LOOKAHEAD: "20"
        run: python watch_robo_one.py

      - name: Commit updated state
        run: |
          if git diff --quiet -- state.json; then
            echo "No state change"
            exit 0
          fi
          branch="${GITHUB_REF_NAME}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json
          git commit -m "Update ROBO-ONE watcher state"
          git pull --rebase origin "$branch"
          git push origin "HEAD:$branch"
